<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrillSign — Elite Cinematic Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Rajdhani:wght@600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#020710;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff}

#stage{position:relative;width:min(940px,100vw);height:min(560px,100vh);display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ── Atmospheric Grid ── */
#grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,180,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,.05) 1px,transparent 1px);
  background-size:50px 50px;opacity:0;animation:gridFade 4s ease .1s forwards}
@keyframes gridFade{0%{opacity:0}15%{opacity:1}75%{opacity:.3}100%{opacity:0}}

/* ── Deep Background Glow ── */
#bgGlow{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(26,115,232,.12) 0%,transparent 70%);
  opacity:0;animation:fadeIn 1.5s ease 4.2s forwards}

canvas{position:absolute;inset:0;width:100%;height:100%}

/* ── Drawing Layer ── */
#drawSVG{position:absolute;inset:0;pointer-events:none;overflow:visible}

#docBody{fill:rgba(0,210,255,.02);stroke:#00d2ff;stroke-width:1.5;
  filter:drop-shadow(0 0 6px rgba(0,210,255,.5));
  opacity:0}
#docFold{fill:rgba(0,210,255,.04);stroke:#00d2ff;stroke-width:1.5;
  opacity:0}

.dtl{stroke:rgba(0,180,255,.2);stroke-width:1.2;stroke-linecap:round;fill:none}
.dtl:nth-child(1){stroke-dasharray:140;stroke-dashoffset:140;animation:drawPath .4s ease 2.0s forwards}
.dtl:nth-child(2){stroke-dasharray:110;stroke-dashoffset:110;animation:drawPath .4s ease 2.15s forwards}
.dtl:nth-child(3){stroke-dasharray:140;stroke-dashoffset:140;animation:drawPath .4s ease 2.3s forwards}
.dtl:nth-child(4){stroke-dasharray:90; stroke-dashoffset:90; animation:drawPath .35s ease 2.45s forwards}

/* ── Signature ── */
#sigText{ font-family:'Dancing Script', 'Brush Script MT', cursive; font-size:48px; font-weight:700; fill:#1A73E8; clip-path:url(#sigClip); filter:drop-shadow(0 0 8px rgba(26,115,232,.8))}
#sigDot{fill:#1A73E8; opacity:0; animation:dotPop .4s cubic-bezier(.34,1.56,.64,1) 3.8s forwards}
#verifyBadge{opacity:0; animation:badgeIn .5s cubic-bezier(.34,1.56,.64,1) 3.6s forwards}

#docGroup{animation:groupOut .8s ease 4.4s forwards}

@keyframes drawPath {to{stroke-dashoffset:0}}
@keyframes dotPop   {0%{opacity:0;r:0}60%{opacity:1;r:4.5}100%{opacity:1;r:3}}
@keyframes fadeIn   {to{opacity:1}}
@keyframes groupOut {to{opacity:0;filter:blur(8px) brightness(1.8)}}
@keyframes badgeIn  {from{opacity:0;transform:scale(0) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ══════════════════════════════════
   ELITE MONOGRAM LOGO (V3)
══════════════════════════════════ */
#logo{
  position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  opacity:0;animation:fadeIn .5s ease 5.2s forwards}

#iconContainer{position:relative;width:120px;height:120px;margin-bottom:24px}

/* The "Geometric Sigil": Two overlapping geometric planes forming 'B' */
.monogram-part{position:absolute;inset:0;fill:none;stroke-width:1.5;stroke-linecap:square}

/* Background shield/hex shape */
#hexShp{
  fill:rgba(26,115,232,.07);stroke:rgba(26,115,232,0.5);
  stroke-dasharray:400;stroke-dashoffset:400;
  animation:drawPath 1s ease 5.2s forwards}

/* Primary 'B' Structure: Sharp, precision-folded planes */
.b-plane{fill:none;stroke-width:3.5;stroke-linejoin:round;stroke-linecap:round}
#b-left{ stroke: #ffffff; stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawPath .8s ease 5.4s forwards; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4))}
#b-right{ stroke: #1A73E8; stroke-dasharray: 240; stroke-dashoffset: 240; animation: drawPath .8s ease 5.6s forwards; filter: drop-shadow(0 0 10px rgba(26,115,232,0.6))}

/* Intersection highlight */
#b-seam{ opacity:0; fill:#4DA6FF; animation: fadeIn .4s ease 6.2s forwards; filter:blur(4px)}

/* ── Elite Typography ── */
#wordmark{
  font-family:'Rajdhani', sans-serif;
  font-size:52px;font-weight:700;letter-spacing:14px;
  color:#ffffff;opacity:0;transform:translateY(15px);
  text-shadow:0 0 25px rgba(26,115,232,.4);
  animation:wordIn .8s cubic-bezier(.22,1,.36,1) 6.0s forwards;
  margin-left:14px; /* offset the tracking center */}
@keyframes wordIn{to{opacity:1;transform:translateY(0)}}

#tagline{
  font-family:'Varela Round', sans-serif;
  font-size:10.5px;letter-spacing:7px;color:rgba(255,255,255,0.4);
  text-transform:uppercase;margin-top:12px;opacity:0;
  animation:fadeIn 1s ease 6.5s forwards}

/* Replay */
#replay{
  position:fixed;bottom:25px;right:25px;padding:10px 24px;
  background:rgba(26,115,232,.08);border:1px solid rgba(26,115,232,.25);
  color:#6cb5ff;border-radius:2px; /* sharp corporate corners */
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;
  text-transform:uppercase;letter-spacing:2px;
  cursor:pointer;opacity:0;transition:all .3s;
  animation:fadeIn .5s ease 7.2s forwards}
#replay:hover{background:rgba(26,115,232,.2);border-color:#1A73E8;color:#fff}
</style>
</head>
<body>
<div id="stage">
  <div id="grid"></div>
  <div id="bgGlow"></div>
  <canvas id="canvas"></canvas>

  <!-- ── Document Stage ── -->
  <svg id="drawSVG" viewBox="0 0 940 560" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="fSig"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="fBdg"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <clipPath id="sigClip"><rect id="sigRect" x="350" y="280" width="0" height="120"/></clipPath>
    </defs>
    <g id="docGroup">
      <path id="docBody" d="M360 80 H545 V85 L570 110 V440 H360 Z"/>
      <polyline id="docFold" points="545,80 545,110 570,110" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
      <g>
        <line class="dtl" x1="385" y1="160" x2="530" y2="160"/>
        <line class="dtl" x1="385" y1="185" x2="490" y2="185"/>
        <line class="dtl" x1="385" y1="210" x2="530" y2="210"/>
        <line class="dtl" x1="385" y1="235" x2="450" y2="235"/>
      </g>
      <!-- BrillSign wordmark signature -->
      <text id="sigText" x="375" y="365" clip-path="url(#sigClip)" filter="url(#fSig)">BrillSign</text>
      <circle id="sigDot" cx="555" cy="358" r="0" filter="url(#fSig)"/>
      <!-- Small checkmark badge -->
      <g id="verifyBadge" transform="translate(535,305)" filter="url(#fBdg)">
        <polygon points="-5,0 -1,4 7,-5" fill="none" stroke="#4da6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </svg>

  <!-- ══ ELITE CORPORATE LOGO ══ -->
  <div id="logo">
    <div id="iconContainer">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Background Shield Frame -->
        <path id="hexShp" d="M50 5 L90 25 V75 L50 95 L10 75 V25 Z" fill="none" stroke-width="1"/>
        
        <!-- Precision B-Geometric Monogram -->
        <!-- Left vertical bar with sharp top angle -->
        <path id="b-left" class="b-plane" d="M32 24 V80"/>
        
        <!-- Folded B loops - Sharp & Geometric -->
        <path id="b-right" class="b-plane" d="M32 24 H55 C70 24 70 48 55 48 H32 M32 48 H60 C75 48 75 80 60 80 H32"/>
        
        <!-- Seam lighting -->
        <circle id="b-seam" cx="32" cy="48" r="5"/>
      </svg>
    </div>
    <div id="wordmark">BRILLSIGN</div>
    <div id="tagline">The Standard in Digital Trust</div>
  </div>
</div>

<button id="replay" onclick="location.reload()">↺ Re-Play Sequence</button>

<script>
// Atmospheric Engine (Enhanced for V3)
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), stage = document.getElementById('stage');
canvas.width = stage.offsetWidth; canvas.height = stage.offsetHeight;
const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2, t0 = performance.now();

class Dot {
  constructor(){this.spawn()}
  spawn(){
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.vx = (Math.random()-.5)*.35; this.vy = (Math.random()-.5)*.35;
    this.r = 0.6+Math.random(); this.base = .15+Math.random()*.3; this.a = 0;
    this.life = 200+Math.random()*200; this.age = 0;
  }
  update(t,phase){
    this.age++;
    if(phase==='converge'){
      const dx=CX-this.x, dy=CY-this.y, d=Math.hypot(dx,dy)||1;
      const f=Math.min(.8,(t-3.8)*.25);
      this.vx+=(dx/d)*f*.07; this.vy+=(dy/d)*f*.07;
      this.vx*=.93; this.vy*=.93;
    }
    if(phase==='done') this.a *= 0.98;
    else{
      const p = this.age/this.life;
      this.a = p<.15 ? p/.15*this.base : p>.85 ? (1-p)/.15*this.base : this.base;
    }
    this.x+=this.vx; this.y+=this.vy;
    if(this.age>this.life && phase!=='done') this.spawn();
  }
  draw(){
    if(this.a<0.01)return;
    ctx.fillStyle=`rgba(120,200,255,${this.a})`;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
  }
}

class Stream {
  constructor(){this.init()}
  init(){
    this.x=-150; this.y = Math.random()*H; this.len=60+Math.random()*120;
    this.spd=0.8+Math.random(); this.a=0; this.target=.15+Math.random()*.15;
  }
  update(phase){
    this.x += this.spd;
    if(phase==='converge'||phase==='done') this.a *= 0.94;
    else this.a = Math.min(this.target, this.a+0.02);
    if(this.x>W+150 && phase!=='done') this.init();
  }
  draw(){
    if(this.a<0.01)return;
    const g=ctx.createLinearGradient(this.x-this.len,this.y,this.x,this.y);
    g.addColorStop(0,'rgba(0,180,255,0)'); g.addColorStop(0.5,`rgba(0,180,255,${this.a})`); g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=g; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(this.x-this.len,this.y); ctx.lineTo(this.x,this.y); ctx.stroke();
  }
}

const dots = Array.from({length:75},()=>new Dot());
const streams = Array.from({length:10},()=>new Stream());

function animate(){
  const t = (performance.now()-t0)/1000;
  const phase = t<3.8?'drift':t<5.5?'converge':'done';
  ctx.clearRect(0,0,W,H);
  streams.forEach(s=>{s.update(phase);s.draw()});
  dots.forEach(d=>{d.update(t,phase);d.draw()});
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('load',()=>{
  // Dynamic path length for document border
  const doc = document.getElementById('docBody');
  if(doc && doc.getTotalLength){
    const len = Math.ceil(doc.getTotalLength());
    doc.style.strokeDasharray = len;
    doc.style.strokeDashoffset = len;
    doc.style.opacity = 1;
    void doc.getBoundingClientRect();
    doc.style.animation = 'drawPath 1.3s cubic-bezier(.4,0,.2,1) .8s forwards';
  }

  // Dynamic path length for fold
  const fold = document.getElementById('docFold');
  if(fold && fold.getTotalLength){
    const len = Math.ceil(fold.getTotalLength());
    fold.style.strokeDasharray = len;
    fold.style.strokeDashoffset = len;
    fold.style.opacity = 1;
    void fold.getBoundingClientRect();
    fold.style.animation = 'drawPath .4s ease 1.8s forwards';
  }

  // Signature reveal logic
  setTimeout(()=>{
    const rect=document.getElementById('sigRect');
    const DUR=1100, TARGET=200, start=performance.now();
    (function draw(){
      const p=Math.min(1,(performance.now()-start)/DUR);
      rect.setAttribute('width', (1-Math.pow(1-p,3))*TARGET);
      if(p<1) requestAnimationFrame(draw);
    })();
  },2750);
});
</script>
</body>
</html>
