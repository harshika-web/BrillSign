<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrillSign — Cinematic Logo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Rajdhani:wght@700&family=Dancing+Script:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #060e1f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        #stage {
            position: relative;
            width: min(900px, 100vw);
            height: min(540px, 100vh);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        /* ── Grid ── */
        #grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 180, 255, .045) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 180, 255, .045) 1px, transparent 1px);
            background-size: 44px 44px;
            opacity: 0;
            animation: gridFade 4.5s ease .1s forwards
        }

        @keyframes gridFade {
            0% {
                opacity: 0
            }

            15% {
                opacity: 1
            }

            70% {
                opacity: .4
            }

            100% {
                opacity: 0
            }
        }

        /* ── Central glow ── */
        #bgGlow {
            position: absolute;
            left: 50%;
            top: 48%;
            transform: translate(-50%, -50%);
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(26, 115, 232, .15) 0%, transparent 68%);
            opacity: 0;
            animation: fadeIn 1.4s ease 4.3s forwards
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%
        }

        /* ── Document drawing SVG ── */
        #drawSVG {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible
        }

        /* Document shape */
        #docBody {
            fill: rgba(0, 210, 255, .03);
            stroke: #00d2ff;
            stroke-width: 1.6;
            stroke-dasharray: 1030;
            stroke-dashoffset: 1030;
            filter: drop-shadow(0 0 6px rgba(0, 210, 255, .7));
            animation: drawPath 1.4s cubic-bezier(.4, 0, .2, 1) .9s forwards
        }

        #docFold {
            fill: rgba(0, 210, 255, .06);
            stroke: #00d2ff;
            stroke-width: 1.6;
            stroke-dasharray: 66;
            stroke-dashoffset: 66;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, .7));
            animation: drawPath .4s ease 1.95s forwards
        }

        /* Text lines inside doc */
        .dtl {
            stroke: rgba(0, 210, 255, .3);
            stroke-width: 1.3;
            stroke-linecap: round;
            fill: none
        }

        .dtl:nth-child(1) {
            stroke-dasharray: 148;
            stroke-dashoffset: 148;
            animation: drawPath .45s ease 2.1s forwards
        }

        .dtl:nth-child(2) {
            stroke-dasharray: 110;
            stroke-dashoffset: 110;
            animation: drawPath .4s ease 2.26s forwards
        }

        .dtl:nth-child(3) {
            stroke-dasharray: 148;
            stroke-dashoffset: 148;
            animation: drawPath .4s ease 2.4s forwards
        }

        .dtl:nth-child(4) {
            stroke-dasharray: 88;
            stroke-dashoffset: 88;
            animation: drawPath .35s ease 2.52s forwards
        }

        .dtl:nth-child(5) {
            stroke-dasharray: 148;
            stroke-dashoffset: 148;
            animation: drawPath .4s ease 2.62s forwards
        }

        /* Signature */
        #sigPath {
            fill: none;
            stroke: #1A73E8;
            stroke-width: 2.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 10px rgba(26, 115, 232, .9));
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            animation: drawPath 1.1s cubic-bezier(.25, .46, .45, .94) 2.8s forwards
        }

        #sigDot {
            fill: #1A73E8;
            filter: drop-shadow(0 0 8px rgba(26, 115, 232, .9));
            opacity: 0;
            animation: dotPop .4s cubic-bezier(.34, 1.56, .64, 1) 3.85s forwards
        }

        #verifyBadge {
            opacity: 0;
            animation: badgeIn .5s cubic-bezier(.34, 1.56, .64, 1) 3.65s forwards
        }

        /* Doc group dissolves */
        #docGroup {
            animation: groupOut .85s ease 4.0s forwards
        }

        @keyframes drawPath {
            to {
                stroke-dashoffset: 0
            }
        }

        @keyframes dotPop {
            0% {
                opacity: 0;
                r: 0
            }

            60% {
                opacity: 1;
                r: 5
            }

            100% {
                opacity: 1;
                r: 3.5
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1
            }
        }

        @keyframes groupOut {
            to {
                opacity: 0;
                filter: blur(5px) brightness(2)
            }
        }

        @keyframes badgeIn {
            from {
                opacity: 0;
                transform: scale(0) translateY(6px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        /* ══════════════════════════════════
   FINAL LOGO
══════════════════════════════════ */
        #logo {
            position: absolute;
            left: 50%;
            top: 47%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0;
            animation: fadeIn .3s ease 4.2s forwards
        }

        /* ── Ring arcs ── */
        /* All arcs share these base styles; stroke-dasharray & stroke-dashoffset set inline */
        .la {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: arcDraw .5s cubic-bezier(.4, 0, .2, 1) var(--d) both
        }

        @keyframes arcDraw {
            to {
                stroke-dashoffset: 0
            }
        }

        /* The arc glow filter */
        #iconSVG {
            width: 200px;
            height: 200px;
            overflow: visible;
            filter: drop-shadow(0 0 12px rgba(30, 120, 255, .45))
        }

        /* ── Center B circle ── */
        #bCircle {
            transform-box: fill-box;
            transform-origin: 50% 50%;
            opacity: 0;
            transform: scale(0);
            animation: icPop .5s cubic-bezier(.34, 1.56, .64, 1) 4.62s forwards
        }

        #bLetter {
            opacity: 0;
            animation: fadeIn .4s ease 4.72s forwards
        }

        /* ── BRILLSIGN wordmark ── */
        #wordmark {
            font-family: 'Rajdhani', 'Varela Round', sans-serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #ffffff;
            opacity: 0;
            transform: translateY(10px);
            text-shadow: 0 0 30px rgba(26, 115, 232, .35);
            animation: wordIn .65s cubic-bezier(.22, 1, .36, 1) 4.85s forwards
        }

        @keyframes wordIn {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ── Tagline ── */
        #tagline {
            font-family: 'Varela Round', sans-serif;
            font-size: 11px;
            letter-spacing: 4px;
            color: #2d8fff;
            opacity: 0;
            margin-top: 6px;
            animation: fadeIn 1s ease 5.15s forwards
        }

        @keyframes icPop {
            from {
                transform: scale(0);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        /* Replay */
        #replay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 9px 22px;
            background: rgba(26, 115, 232, .12);
            border: 1px solid rgba(26, 115, 232, .3);
            color: #4da6ff;
            border-radius: 30px;
            font-family: 'Varela Round', sans-serif;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: background .25s;
            animation: fadeIn .5s ease 6.2s forwards
        }

        #replay:hover {
            background: rgba(26, 115, 232, .28)
        }
    </style>
</head>

<body>
    <div id="stage">
        <div id="grid"></div>
        <div id="bgGlow"></div>
        <canvas id="canvas"></canvas>

        <!-- ── Document + Signature Drawing ── -->
        <svg id="drawSVG" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="fDoc">
                    <feGaussianBlur stdDeviation="3.5" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="fSig">
                    <feGaussianBlur stdDeviation="4.5" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="fBdg">
                    <feGaussianBlur stdDeviation="2" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <!-- Clip-path that progressively reveals the BrillSign signature -->
                <clipPath id="sigClip">
                    <rect id="sigRect" x="350" y="310" width="0" height="70" />
                </clipPath>
            </defs>
            <g id="docGroup">
                <!-- Document body -->
                <path id="docBody" d="M340 90 H525 V95 L550 120 V430 H340 Z" filter="url(#fDoc)" />
                <polyline id="docFold" points="525,90 525,120 550,120" fill="none" stroke="#00d2ff" stroke-width="1.6"
                    filter="url(#fDoc)" />
                <!-- Text lines -->
                <g filter="url(#fDoc)">
                    <line class="dtl" x1="362" y1="158" x2="510" y2="158" />
                    <line class="dtl" x1="362" y1="182" x2="472" y2="182" />
                    <line class="dtl" x1="362" y1="206" x2="510" y2="206" />
                    <line class="dtl" x1="362" y1="230" x2="438" y2="230" />
                    <line class="dtl" x1="362" y1="254" x2="510" y2="254" />
                </g>
                <!-- BrillSign signature — resized to fit document -->
                <text id="sigText" font-family="'Dancing Script', cursive" font-size="44" font-weight="700"
                    fill="#1A73E8" x="358" y="362" clip-path="url(#sigClip)" filter="url(#fSig)">BrillSign</text>
                <circle id="sigDot" cx="516" cy="358" r="0" filter="url(#fSig)" />
                <!-- Verification tick -->
                <g id="verifyBadge" transform="translate(508,308)" filter="url(#fBdg)">
                    <circle cx="0" cy="0" r="19" fill="rgba(26,115,232,.13)" stroke="#1A73E8" stroke-width="1.5" />
                    <path d="M-8 0 L-2 7 L10 -6" fill="none" stroke="#4da6ff" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </g>
            </g>
        </svg>

        <!-- ══ FINAL LOGO ══ -->
        <div id="logo">
            <!--
      Fingerprint ring icon: Center=(120,120), viewBox 240×240
      4 groups of 3 concentric arcs, rotated 90° apart.
      Group NE (275°→355°), SE (5°→85°), SW (95°→175°), NW (185°→265°)
      Radii: 50 (dasharray≈70), 64 (≈90), 78 (≈109)
      Gradient: diagonal blue-cyan (#4dcfff → #0052cc)
    -->
            <svg id="iconSVG" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#5dd5ff" />
                        <stop offset="45%" stop-color="#1a8aee" />
                        <stop offset="100%" stop-color="#0044bb" />
                    </linearGradient>
                    <radialGradient id="bgCircle" cx="50%" cy="42%" r="55%">
                        <stop offset="0%" stop-color="#0e2048" />
                        <stop offset="100%" stop-color="#08152e" />
                    </radialGradient>
                    <filter id="arcGlow">
                        <feGaussianBlur stdDeviation="2.5" result="b" />
                        <feMerge>
                            <feMergeNode in="b" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <filter id="bGlow">
                        <feGaussianBlur stdDeviation="3" result="b" />
                        <feMerge>
                            <feMergeNode in="b" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <!-- Background circle -->
                <circle cx="120" cy="120" r="104" fill="url(#bgCircle)" />

                <!-- ── ARC GROUPS ── -->
                <g stroke="url(#arcGrad)" stroke-width="5.5" fill="none" filter="url(#arcGlow)">

                    <!-- GROUP NE (275° → 355°) -->
                    <!-- r=50 → arc≈70 -->
                    <path class="la" style="--d:4.0s; stroke-dasharray:70; stroke-dashoffset:70"
                        d="M 124.4 70.2 A 50 50 0 0 1 169.8 115.6" />
                    <!-- r=64 → arc≈90 -->
                    <path class="la" style="--d:4.12s;stroke-dasharray:90; stroke-dashoffset:90"
                        d="M 125.6 56.2 A 64 64 0 0 1 183.8 114.4" />
                    <!-- r=78 → arc≈109-->
                    <path class="la" style="--d:4.24s;stroke-dasharray:109;stroke-dashoffset:109"
                        d="M 126.8 42.3 A 78 78 0 0 1 197.7 113.2" />

                    <!-- GROUP SE (5° → 85°) -->
                    <!-- r=50 -->
                    <path class="la" style="--d:4.09s;stroke-dasharray:70; stroke-dashoffset:70"
                        d="M 169.8 124.4 A 50 50 0 0 1 124.4 169.8" />
                    <!-- r=64 -->
                    <path class="la" style="--d:4.21s;stroke-dasharray:90; stroke-dashoffset:90"
                        d="M 183.8 125.6 A 64 64 0 0 1 125.6 183.8" />
                    <!-- r=78 -->
                    <path class="la" style="--d:4.33s;stroke-dasharray:109;stroke-dashoffset:109"
                        d="M 197.7 126.8 A 78 78 0 0 1 126.8 197.7" />

                    <!-- GROUP SW (95° → 175°) -->
                    <!-- r=50 -->
                    <path class="la" style="--d:4.18s;stroke-dasharray:70; stroke-dashoffset:70"
                        d="M 115.6 169.8 A 50 50 0 0 1  70.2 124.4" />
                    <!-- r=64 -->
                    <path class="la" style="--d:4.30s;stroke-dasharray:90; stroke-dashoffset:90"
                        d="M 114.4 183.8 A 64 64 0 0 1  56.2 125.6" />
                    <!-- r=78 -->
                    <path class="la" style="--d:4.42s;stroke-dasharray:109;stroke-dashoffset:109"
                        d="M 113.2 197.7 A 78 78 0 0 1  42.3 126.8" />

                    <!-- GROUP NW (185° → 265°) -->
                    <!-- r=50 -->
                    <path class="la" style="--d:4.27s;stroke-dasharray:70; stroke-dashoffset:70"
                        d="M  70.2 115.6 A 50 50 0 0 1 115.6  70.2" />
                    <!-- r=64 -->
                    <path class="la" style="--d:4.39s;stroke-dasharray:90; stroke-dashoffset:90"
                        d="M  56.2 114.4 A 64 64 0 0 1 114.4  56.2" />
                    <!-- r=78 -->
                    <path class="la" style="--d:4.51s;stroke-dasharray:109;stroke-dashoffset:109"
                        d="M  42.3 113.2 A 78 78 0 0 1 113.2  42.3" />
                </g>

                <!-- Center ring -->
                <circle id="bCircle" cx="120" cy="120" r="36" fill="rgba(26,100,232,.18)" stroke="rgba(100,180,255,.25)"
                    stroke-width="1.5" />
                <!-- B letter -->
                <text id="bLetter" x="120" y="128" text-anchor="middle" dominant-baseline="middle"
                    font-family="'Rajdhani','Arial Black',sans-serif" font-size="42" font-weight="900" fill="#ffffff"
                    filter="url(#bGlow)" letter-spacing="-1">B</text>
            </svg>

            <div id="wordmark">BRILLSIGN</div>
            <div id="tagline">SECURE &nbsp;·&nbsp; ENCRYPTED &nbsp;·&nbsp; VERIFIABLE</div>
        </div>
    </div>
    <button id="replay" onclick="location.reload()">↺ Replay</button>

    <script>
        // ── Canvas Particle + Stream System (identical to v1) ──
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const stage = document.getElementById('stage');
        canvas.width = stage.offsetWidth;
        canvas.height = stage.offsetHeight;
        const W = canvas.width, H = canvas.height, CX = W / 2, CY = H / 2;
        const t0 = performance.now();

        class Dot {
            constructor() { this.spawn() }
            spawn() {
                this.x = Math.random() * W; this.y = Math.random() * H;
                this.vx = (Math.random() - .5) * .44; this.vy = (Math.random() - .5) * .44;
                this.r = .5 + Math.random() * 1.1;
                this.base = .1 + Math.random() * .36; this.a = 0;
                this.age = 0; this.life = 160 + Math.random() * 220;
                this.hue = 195 + Math.random() * 30;
            }
            tick(t, phase) {
                this.age++;
                if (phase === 'converge') {
                    const dx = CX - this.x, dy = CY - this.y, d = Math.hypot(dx, dy) || 1;
                    const f = Math.min(.7, (t - 3.8) * .22);
                    this.vx += (dx / d) * f * .065; this.vy += (dy / d) * f * .065;
                    this.vx *= .92; this.vy *= .92;
                }
                if (phase === 'done') this.a = Math.max(0, this.a - .009);
                else {
                    const p = this.age / this.life;
                    this.a = p < .12 ? p / .12 * this.base : p > .85 ? (1 - p) / .15 * this.base : this.base;
                }
                this.x += this.vx; this.y += this.vy;
                if (this.age > this.life && phase !== 'done') this.spawn();
            }
            draw() {
                if (this.a <= 0) return;
                ctx.save();
                ctx.shadowBlur = 7; ctx.shadowColor = `hsla(${this.hue},90%,65%,${this.a})`;
                ctx.fillStyle = `hsla(${this.hue},90%,68%,${this.a})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Stream {
            constructor(delay) { this.delay = delay; this.active = false; this.a = 0; this._init(); setTimeout(() => this.active = true, delay) }
            _init() { this.x = -120; this.y = 20 + Math.random() * (H - 40); this.len = 55 + Math.random() * 110; this.spd = .6 + Math.random() * .9; this.target = .17 + Math.random() * .22; this.col = Math.random() < .65 ? '0,210,255' : '26,115,232' }
            tick(phase) { if (!this.active) return; this.x += this.spd; if (phase === 'converge' || phase === 'done') this.a = Math.max(0, this.a - .018); else this.a = Math.min(this.target, this.a + .028); if (this.x > W + 160 && phase !== 'done') this._init() }
            draw() {
                if (!this.active || this.a <= 0) return;
                const g = ctx.createLinearGradient(this.x - this.len, this.y, this.x, this.y);
                g.addColorStop(0, `rgba(${this.col},0)`); g.addColorStop(.45, `rgba(${this.col},${this.a})`); g.addColorStop(1, `rgba(${this.col},0)`);
                ctx.save(); ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.shadowBlur = 5; ctx.shadowColor = `rgba(${this.col},.5)`;
                ctx.beginPath(); ctx.moveTo(this.x - this.len, this.y); ctx.lineTo(this.x, this.y); ctx.stroke(); ctx.restore();
            }
        }

        function drawLinks(dots, maxD) {
            for (let i = 0; i < dots.length - 1; i++) {
                for (let j = i + 1; j < dots.length; j++) {
                    const d = Math.hypot(dots[i].x - dots[j].x, dots[i].y - dots[j].y);
                    if (d < maxD) { ctx.save(); ctx.strokeStyle = `rgba(0,180,255,${(1 - d / maxD) * .06})`; ctx.lineWidth = .5; ctx.beginPath(); ctx.moveTo(dots[i].x, dots[i].y); ctx.lineTo(dots[j].x, dots[j].y); ctx.stroke(); ctx.restore(); }
                }
            }
        }

        const dots = Array.from({ length: 68 }, () => { const d = new Dot(); d.age = Math.floor(Math.random() * 80); return d });
        const sample = dots.filter((_, i) => i % 2 === 0);
        const streams = [0, 350, 700, 1050, 150, 500, 850, 1200, 250, 600, 950, 100].map(d => new Stream(d));

        function render() {
            const t = (performance.now() - t0) / 1000;
            const phase = t < 3.8 ? 'drift' : t < 5.4 ? 'converge' : 'done';
            ctx.clearRect(0, 0, W, H);
            if (phase !== 'done') streams.forEach(s => { s.tick(phase); s.draw() });
            drawLinks(sample, 90);
            dots.forEach(d => { d.tick(t, phase); d.draw() });
            requestAnimationFrame(render);
        }
        render();

        // ── Animate document outline draw ──
        window.addEventListener('load', () => {
            const docEl = document.getElementById('docBody');
            if (docEl && docEl.getTotalLength) {
                const len = Math.ceil(docEl.getTotalLength());
                docEl.style.strokeDasharray = len;
                docEl.style.strokeDashoffset = len;
                void docEl.getBoundingClientRect();
                docEl.style.animation = 'drawPath 1.4s cubic-bezier(.4,0,.2,1) .9s forwards';
            }
            // ── Animate BrillSign signature reveal via clip-path ──
            setTimeout(() => {
                const rect = document.getElementById('sigRect');
                if (!rect) return;
                const TARGET = 165, DUR = 1150, t0sig = performance.now();
                (function drawSig() {
                    const t = Math.min(1, (performance.now() - t0sig) / DUR);
                    const ease = 1 - Math.pow(1 - t, 3); // cubic ease-out
                    rect.setAttribute('width', ease * TARGET);
                    if (t < 1) requestAnimationFrame(drawSig);
                })();
            }, 2750);
        });
    </script>
</body>

</html>
